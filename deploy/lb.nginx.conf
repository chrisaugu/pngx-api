http {
    upstream backend_servers {
        server localhost:3000 weight=N,max_fails=N;
        server localhost:3000 weight=N,max_fails=N;
    }

    upstream stock_ticker_backend {
        server api1.example.com;
        server api2.example.com;
    }
    
    upstream internal_api_backend {
        server internal-api1.example.com;
        server internal-api2.example.com;
    }

    upstream backend_servers {
        server server1:8080;
        server server2:8080;
        server server3:8080;
    }

    server {
        listen 80;
        location /api {
            proxy_pass http://stock_ticker_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
    
    server {
        listen 8081;
        location /api-internal {
            proxy_pass http://internal_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 80;
        server_name example.com;
        
        # Root Directory
        root /var/www/html;
        index index.html index.htm;

        # Performance
        client_max_body_size 10M;
        keepalive_timeout 65;

        # Gzip Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # SSL Configuration
        # listen 443 ssl http2;
        # ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        # Force HTTPS
        if ($scheme != "https") {
            return 301 https://$host$request_uri;
        }

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self';" always;

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 80;
        server_name loadbalancer.com;
        
        # Root Directory
        root /var/www/html;
        index index.html index.htm;

        # Performance
        client_max_body_size 10M;
        keepalive_timeout 120;

        # Gzip Compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # SSL Configuration
        # listen 443 ssl http2;
        # ssl_certificate /etc/letsencrypt/live/loadbalancer.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/loadbalancer.com/privkey.pem;

        # Force HTTPS
        if ($scheme != "https") {
            return 301 https://$host$request_uri;
        }

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self';" always;

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
